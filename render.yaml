services:
  - type: web
    name: google-analytics-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://google-analytics-mcp-u8cy.onrender.com
      - key: TOKEN_STORAGE_DIR
        value: /tmp/ga_tokens
      - key: PYTHON_VERSION
        value: "3.12.0"
